name: Selenium BDD CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Nightly regression run at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options: [ chrome, firefox ]
      env:
        description: 'Environment'
        required: true
        default: 'qa'
        type: choice
        options: [ qa, staging ]
      tags:
        description: 'Cucumber tag filter'
        required: false
        default: '@smoke and not @skip'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [ chrome, firefox ]   # Both browsers tested on every push/PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Firefox
        if: matrix.browser == 'firefox'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y firefox

      - name: Run tests
        # maven.test.failure.ignore lets Maven reach the verify phase (reporting plugins)
        # even when tests fail; we detect failures explicitly in the next step.
        run: |
          mvn clean verify \
            -Dbrowser=${{ github.event.inputs.browser || matrix.browser }} \
            -Dheadless=true \
            -Denv=${{ github.event.inputs.env || 'qa' }} \
            -Dcucumber.filter.tags="${{ github.event.inputs.tags || '@smoke and not @skip' }}" \
            -DsuiteFile=testng.xml \
            -Dmaven.test.failure.ignore=true

      - name: Check for test failures
        # Fail the CI job if any Surefire report contains failures or errors.
        # This gives us reporting artifacts AND a failing build when tests break.
        run: |
          REPORTS=$(find target/surefire-reports -name '*.xml' 2>/dev/null || true)
          if [ -z "$REPORTS" ]; then
            echo "No Surefire reports found — build may have failed before tests ran."
            exit 1
          fi
          if grep -l 'failures="[1-9]\|errors="[1-9]' $REPORTS 2>/dev/null | grep -q .; then
            echo "::error::One or more tests failed. Check the Allure / Cucumber reports in artifacts."
            exit 1
          fi
          echo "All tests passed."

      - name: Generate Allure report
        if: always()
        continue-on-error: true
        run: mvn allure:report -q

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/
          if-no-files-found: warn

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-${{ matrix.browser }}
          path: target/site/allure-maven-plugin/
          if-no-files-found: warn

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cucumber-reports-${{ matrix.browser }}
          path: target/cucumber-reports/
          if-no-files-found: warn

      - name: Upload screenshots & evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: failure-evidence-${{ matrix.browser }}
          path: |
            test-output/screenshots/
            test-output/evidence/
            logs/
          if-no-files-found: warn
